<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan Kalkulator Bunga Simple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="section">
        <h1 class="text-align-center">Simple Loan Calculator</h1>
        <div class="separator-card">
            <div class="calculator-card mb-20">
                <h2>Kalkulator Cicilan Flat (Pinjaman)</h2>
                
                <label for="">Pokok Pinjaman (Rp):</label>
                <input type="number" id="pokok" placeholder="contoh: 10000000">
                
                <label for="">Bunga per Tahun (p.a):</label>
                <input type="number" id="bunga" step="0.1" placeholder="contoh: 3.0">
                
                <label for="">Tenor (Bulan):</label>
                <input type="number" id="bulan" step="0.1" placeholder="contoh: 18">
                
                <button onclick="hitungCicilan()">Hitung Cicilan</button>
                
                <div id="hasil" class="result-box display-none">
                    <p>Total Bunga: <strong id="resBunga"></strong></p>
                    <p>Total Bayar: <strong id="resTotal"></strong></p>
                    <hr>
                    <p>Cicilan per Bulan</p>
                    <h3 id="resBulanan"></h3>
                </div>
            </div>
            
            <div class="calculator-card">
                <h2>Kalkulator Pinjaman Bank</h2>
                
                <label for="">Jumlah Pinjaman (Rp):</label>
                <input type="text" id="pokokBank" oninput="updateBungaOtomatis(this)" placeholder="Masukan nominal...">
                
                <div class="info-bunga">
                    Bunga yang diterapkan: <span id="bungaTerdeteksi"></span> p.a
                </div>
                
                <label for="">Tenor (Bulan):</label>
                <input type="number" id="bulanBank" step="0.1" placeholder="contoh: 18">
                
                <button onclick="hitungCicilanBank()">Hitung Cicilan Bank</button>
                
                <div id="hasilBank" class="result-box display-none">
                    <p>Total Pinjam: <strong id="resPinjamBank"></strong></p>
                    <hr>
                    <p>Total Bunga: <strong id="resBungaBank"></strong></p>
                    <p>Total Bayar: <strong id="resTotalBank"></strong></p>
                    <hr>
                    <p>Cicilan per Bulan</p>
                    <h3 id="resBulananBank"></h3>
                </div>
            </div>
        </div>
        <footer>
            This web created by <strong class="author">Ryan Roshandy Sachio</strong>
        </footer>
    </div>
    <script src="webBankInterest.js"></script>
    
    </body>
</html>
